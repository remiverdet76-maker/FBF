<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Moteur 100% Web Audio natif — aucune dépendance externe (Tone.js retiré) -->
<style>
/* ═══════════════════════════════════════════
   01-base.css — Layout plein écran, fond cosmique
   ═══════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0;}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;}

body{
  width:100vw;height:100vh;overflow:hidden;
  font-family:'IM Fell English',Georgia,serif;
  color:#f0ead8;
  background:#02010D;
}

/* Image cosmique de fond */
#cosmic-bg{
  position:fixed;inset:0;z-index:-1;
  width:100%;height:100%;object-fit:cover;
  opacity:0.55;transition:opacity 1.2s ease,transform 1.2s ease,filter 1.5s ease;
  will-change:transform;
}

/* Canvas 3D */
#meta-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  display:block;z-index:0;
  background:transparent;
}

/* Couche sphère */
#sphere-layer{
  position:fixed;inset:0;z-index:10;
  pointer-events:none;
}
#sphere-layer #fbf-sphere-wrap {
  pointer-events:all;
}

/* ─── Panels latéraux (FX, UT432) ─────── */
.pan-left{
  position:fixed;top:0;left:-260px;
  width:240px;height:calc(100vh - 62px);
  z-index:80;
  background:rgba(1,3,6,.95);border:1px solid rgba(0,204,255,.14);
  border-radius:0;padding:13px;pointer-events:auto;
  backdrop-filter:blur(14px);display:none;
  overflow-y:auto;scrollbar-width:none;
}
.pan-left.open{display:block;left:0;}
.pan-left::-webkit-scrollbar{display:none;}

.pan-right{
  position:fixed;top:0;right:-300px;
  width:280px;height:calc(100vh - 62px);
  z-index:80;
  background:rgba(1,3,6,.96);
  border-left:1.5px solid rgba(200,100,255,.25);
  backdrop-filter:blur(18px);
  transition:right .32s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:rgba(200,100,255,.25) transparent;
  padding:14px;
}
.pan-right.open{right:0;}
.pan-right::-webkit-scrollbar{width:3px;}
.pan-right::-webkit-scrollbar-thumb{background:rgba(200,100,255,.25);border-radius:3px;}

/* Section title dans les panels */
.pct{
  font-family:'IM Fell English',serif;
  font-size:8px;letter-spacing:.28em;text-transform:uppercase;
  color:#00ccff;opacity:.55;margin-bottom:9px;
}

/* ─── Modal oscillateur ────────────────── */
#osc-modal{
  position:fixed;inset:0;z-index:50;
  display:none;align-items:center;justify-content:center;
  pointer-events:none;
}
#osc-modal.open{display:flex;pointer-events:all;}
#osc-modal-inner{
  background:rgba(8,0,26,.96);
  border:1.5px solid rgba(200,100,255,.48);
  border-radius:24px;
  width:min(560px,92vw);max-height:88vh;
  display:flex;flex-direction:column;
  backdrop-filter:blur(22px);
  box-shadow:0 0 70px rgba(120,0,255,.4);
  overflow:hidden;
}
#osc-modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.4rem;
  border-bottom:1px solid rgba(200,100,255,.2);
  flex-shrink:0;
}
#osc-modal-title{
  font-family:'Cinzel Decorative',serif;
  font-size:1.1rem;letter-spacing:.15em;
  background:linear-gradient(90deg,#FF8EFF,#63E6FF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#osc-modal-body{
  flex:1;overflow-y:auto;padding:1.2rem 1.4rem;
  scrollbar-width:thin;scrollbar-color:rgba(200,100,255,.3) transparent;
}

/* Backdrop */
#backdrop{
  position:fixed;inset:0;z-index:45;
  background:rgba(0,0,0,.6);display:none;
  backdrop-filter:blur(4px);
}
#backdrop.open{display:block;}

/* Bouton fermer modal */
.panel-close{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.22);
  color:rgba(245,240,225,.8);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.panel-close:hover{background:rgba(255,80,80,.18);border-color:rgba(255,120,120,.6);color:#ff9999;}

/* HUD minuterie */
#ses-timer-hud{
  position:fixed;bottom:75px;left:50%;transform:translateX(-50%);
  z-index:95;cursor:pointer;
  width:56px;height:56px;
  filter:drop-shadow(0 0 10px rgba(200,100,255,.35));
  transition:opacity .4s;
}
#ses-timer-hud.active{animation:hudBreath 4s ease-in-out infinite;}
#timer-hud-pct{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel Decorative',serif;font-size:.56rem;letter-spacing:.06em;
  color:#86FFC0;pointer-events:none;
}

/* Sliders dans pan-left/pan-right (thème général) */
.sl-row{display:flex;flex-direction:column;gap:3px;padding:5px 2px;}
.sl-row label{
  font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(200,180,255,.28);display:flex;justify-content:space-between;
}
.sl-row label span{color:rgba(255,200,80,.65);}
.sl-row input[type=range]{
  width:100%;height:3px;-webkit-appearance:none;
  background:rgba(255,255,255,.09);border-radius:3px;cursor:pointer;outline:none;
}
.sl-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:rgba(255,200,80,.82);cursor:pointer;
}
.sw-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 3px;font-size:.68rem;border-bottom:1px solid rgba(255,255,255,.04);
  color:rgba(200,180,255,.52);
}
.sw{
  width:30px;height:16px;border-radius:8px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  cursor:pointer;transition:all .18s;
  -webkit-appearance:none;appearance:none;
  position:relative;flex-shrink:0;
}
.sw:checked{background:rgba(255,200,80,.3);border-color:rgba(255,200,80,.42);}
.sw::after{content:'';width:10px;height:10px;background:rgba(200,180,255,.75);border-radius:50%;position:absolute;top:2px;left:2px;transition:left .18s;}
.sw:checked::after{left:16px;}

/* Keyframes */
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes prog-pulse{0%,100%{box-shadow:0 0 8px rgba(255,140,40,.3);}50%{box-shadow:0 0 22px rgba(255,140,40,.7);}}
@keyframes fbfPulse{0%,100%{box-shadow:0 0 30px rgba(200,100,255,.6),inset 0 0 15px rgba(255,255,255,.3);}50%{box-shadow:0 0 60px rgba(99,230,255,.9),inset 0 0 25px rgba(255,255,255,.5);}}
@keyframes magicRotate{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}
@keyframes fluxPulse{0%,100%{box-shadow:0 0 20px rgba(99,230,255,.4);}50%{box-shadow:0 0 45px rgba(99,230,255,.9),0 0 70px rgba(200,100,255,.4);}}
@keyframes ut432Glow{0%,100%{text-shadow:0 0 20px currentColor;}50%{text-shadow:0 0 50px currentColor,0 0 80px currentColor;}}
@keyframes hudBreath{0%,100%{filter:drop-shadow(0 0 8px rgba(200,100,255,.3));}50%{filter:drop-shadow(0 0 20px rgba(200,100,255,.65));}}

/* ═══════════════════════════════════════════
   02-vesica.css — Bulle FBF396 (sphère unique)
   ═══════════════════════════════════════════ */

/* ── Conteneur centré ───────────────────── */
#fbf-sphere-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -56%);
  width:  clamp(230px, 58vmin, 340px);
  height: clamp(230px, 58vmin, 340px);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: all;
  z-index: 8;
}

/* ── Bulle principale ───────────────────── */
.fbf-bubble {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,.55);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: filter .35s, transform .22s;
  /* Légère texture verre */
  backdrop-filter: blur(2px);
}
.fbf-bubble:hover  { filter: brightness(1.18); }
.fbf-bubble:active { transform: scale(.95); }

/* Animation de pulsation quand le flux est actif */
.fbf-bubble.sph-flowing {
  animation: sphPulse 3.2s ease-in-out infinite;
}
@keyframes sphPulse {
  0%,100% { filter: brightness(1) saturate(1); }
  50%     { filter: brightness(1.32) saturate(1.25); }
}

/* ── Reflet spéculaire (effet verre) ───── */
.sph-shine {
  position: absolute;
  top: 9%;
  left: 16%;
  width: 38%;
  height: 32%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,.65) 0%, transparent 70%);
  pointer-events: none;
  transform: rotate(-15deg);
}

/* ── Contenu intérieur ──────────────────── */
.sph-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .45rem;
  pointer-events: none;
  position: relative;
  z-index: 2;
}

.sph-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.8rem, 3.2vmin, 1.2rem);
  font-weight: 700;
  letter-spacing: .26em;
  color: #fff;
  text-shadow: 0 0 24px rgba(0,0,0,.9), 0 0 44px rgba(255,255,255,.35);
}

.sph-freq {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2rem, 8.5vmin, 3.6rem);
  font-weight: 400;
  color: #FF2020;
  text-shadow:
    0 1px 0 rgba(255,100,100,1),
    0 2px 0 rgba(200,20,20,.9),
    0 3px 0 rgba(160,0,0,.75),
    0 4px 3px rgba(120,0,0,.45),
    0 0 22px rgba(255,70,70,.6),
    0 0 50px rgba(255,0,0,.25);
  line-height: 1;
  letter-spacing: .06em;
}

.sph-sub {
  font-family: 'IM Fell English', serif;
  font-size: clamp(.52rem, 2vmin, .78rem);
  font-style: italic;
  color: rgba(255,255,255,.72);
  letter-spacing: .16em;
  text-shadow: 0 0 10px rgba(0,0,0,.9);
  text-transform: uppercase;
}

/* ── Boutons + et − ────────────────────── */
.sph-btn {
  position: absolute;
  width:  clamp(44px, 11vmin, 58px);
  height: clamp(44px, 11vmin, 58px);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.65);
  background: rgba(6,2,20,.88);
  color: rgba(255,255,255,.92);
  font-size: clamp(1.2rem, 3.8vmin, 1.9rem);
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .18s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 0 14px rgba(0,0,0,.65);
  z-index: 12;
}
.sph-btn:hover  { transform: scale(1.22); border-color: #fff; box-shadow: 0 0 22px rgba(200,160,255,.6); }
.sph-btn:active { transform: scale(.9); }

.sph-plus  { bottom: 7%; right: 7%; }
.sph-minus { bottom: 7%; left:  7%; }

/* ── Navigation bas d'écran ─────────────── */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 62px;
  display: flex;
  align-items: stretch;
  justify-content: space-around;
  background: rgba(4,2,16,.92);
  border-top: 1px solid rgba(200,100,255,.18);
  backdrop-filter: blur(18px);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.bnav {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px 4px;
  transition: all .2s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.bnav-icon {
  font-size: 1.25rem;
  color: rgba(200,170,255,.48);
  transition: all .2s;
  line-height: 1;
}
.bnav-lbl {
  font-family: 'Cinzel Decorative', serif;
  font-size: .47rem;
  letter-spacing: .16em;
  color: rgba(200,170,255,.38);
  text-transform: uppercase;
  transition: all .2s;
}
.bnav:hover .bnav-icon,
.bnav.active .bnav-icon,
.bnav.on    .bnav-icon {
  color: rgba(200,100,255,.9);
  text-shadow: 0 0 14px rgba(200,100,255,.6);
}
.bnav:hover .bnav-lbl,
.bnav.active .bnav-lbl,
.bnav.on    .bnav-lbl {
  color: rgba(200,100,255,.82);
}

/* ── Titre application ──────────────────── */
#app-title {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.75rem, 3vw, 1.1rem);
  font-weight: 700;
  letter-spacing: .3em;
  color: rgba(200,170,255,.38);
  text-shadow: 0 0 24px rgba(200,100,255,.18);
  z-index: 50;
  pointer-events: none;
  white-space: nowrap;
}

/* ── Micro-boutons (compatibilité modal oscillateur) ── */
.micro-btn {
  position: absolute;
  width: 42px; height: 42px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.7);
  background: rgba(12,2,32,.9);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all .18s; z-index: 10;
  color: rgba(255,255,255,.95);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
.micro-btn:hover { border-color:#fff; transform:scale(1.28); box-shadow:0 0 18px rgba(180,100,255,.8); }
.micro-left  { left:2px;   top:50%; transform:translateY(-50%); }
.micro-right { right:2px;  top:50%; transform:translateY(-50%); }
.micro-top   { top:2px;    left:50%;transform:translateX(-50%); }
.micro-bot   { bottom:2px; left:50%;transform:translateX(-50%); }

/* ── Tiroir menu déroulant ──────────────── */
#drop-menu {
  position: fixed;
  bottom: 62px; left: 0; right: 0;
  z-index: 95;
  background: rgba(2,1,18,.97);
  border-top: 1.5px solid rgba(200,100,255,.28);
  border-radius: 20px 20px 0 0;
  backdrop-filter: blur(22px);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  padding: 10px 0 8px;
  max-height: 72vh;
  overflow-y: auto;
}
#drop-menu.open { transform: translateY(0); }

#menu-backdrop {
  position: fixed; inset: 0; z-index: 94;
  background: rgba(0,0,0,.45);
  backdrop-filter: blur(3px);
  display: none;
}
#menu-backdrop.open { display: block; }

.dmenu-item {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 14px 24px;
  background: none; border: none;
  color: rgba(220,200,255,.8);
  font-family: 'IM Fell English', serif;
  font-size: 1rem; letter-spacing: .06em;
  text-decoration: none; cursor: pointer;
  transition: background .15s; text-align: left;
}
.dmenu-item:active { background: rgba(200,100,255,.15); }

.dmenu-ico {
  color: #00ccff; font-size: 1.1rem;
  width: 22px; text-align: center; flex-shrink: 0;
}
.dmenu-sep {
  height: 1px; background: rgba(255,255,255,.08);
  margin: 6px 24px;
}
.dmenu-section {
  font-family: 'Cinzel Decorative', serif;
  font-size: .48rem; letter-spacing: .28em;
  text-transform: uppercase;
  color: rgba(200,170,255,.32);
  padding: 6px 24px 2px;
}

/* ── Surimpression module (iframe plein écran) ── */
#screen-overlay{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;background:#02010D;}
#screen-overlay.open{display:flex;}
#screen-overlay-bar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;background:rgba(2,1,18,.97);border-bottom:1.5px solid rgba(200,100,255,.28);backdrop-filter:blur(22px);}
#screen-overlay-title{font-family:'Cinzel Decorative',serif;font-size:.82rem;letter-spacing:.12em;color:rgba(220,200,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#screen-overlay-close{flex-shrink:0;width:38px;height:38px;border-radius:12px;background:rgba(255,80,80,.12);border:1px solid rgba(255,120,120,.35);color:#ff9999;font-size:1.1rem;line-height:1;cursor:pointer;}
#screen-overlay-close:active{background:rgba(255,80,80,.28);}
#screen-frame{flex:1 1 auto;width:100%;height:100%;border:none;background:#02010D;}

/* ── Onglet 3D ── */
.pan3d-head{display:flex;justify-content:space-between;align-items:center;font-family:'Cinzel Decorative',serif;font-size:.8rem;letter-spacing:.1em;color:#E0C8FF;margin-bottom:10px;}
.pan3d-sec{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(200,170,255,.45);margin:12px 0 6px;border-bottom:1px solid rgba(200,100,255,.12);padding-bottom:3px;}
.pan3d-row{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:rgba(220,205,255,.85);margin:8px 0 2px;}
.pan3d-row span{color:#F3D9FF;font-family:'Share Tech Mono',monospace;font-size:.7rem;}
.fx3d-forms{display:grid;grid-template-columns:1fr 1fr;gap:.3rem;}
.fx3d-ratios{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.3rem;}
.fx3d-form,.fx3d-ratio{font-family:'IM Fell English',serif;font-size:.72rem;padding:7px 4px;border-radius:7px;cursor:pointer;text-align:center;color:rgba(220,200,255,.7);background:rgba(80,40,140,.18);border:1px solid rgba(200,100,255,.18);transition:all .15s;}
.fx3d-ratio{font-family:'Share Tech Mono',monospace;font-size:.62rem;}
.fx3d-form:hover,.fx3d-ratio:hover{border-color:#F3D9FF;color:#fff;}
.fx3d-form.on,.fx3d-ratio.on{background:rgba(200,100,255,.28);border-color:#F3D9FF;color:#fff;box-shadow:0 0 10px rgba(200,100,255,.4);}

/* ── Spectroid éventuel dans panel FX ───── */
#spectroid-bar { display: none; }

/* ═══════════════════════════════════════════
   03-controls.css — FBF, Flux, spectroid, menus, 3D params
   ═══════════════════════════════════════════ */

/* ─── Bouton Flux (gauche) ───────────────────── */
#flux-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.2rem;
  width:64px;height:160px;
  border-radius:32px;
  background:rgba(10,4,30,.85);
  border:2px solid rgba(99,230,255,.4);
  color:rgba(99,230,255,.8);
  backdrop-filter:blur(12px);
  transition:all .3s;
  box-shadow:0 0 20px rgba(99,230,255,.12);
}
#flux-btn:hover{
  border-color:rgba(99,230,255,.85);
  box-shadow:0 0 30px rgba(99,230,255,.35);
  color:#63E6FF;
}
#flux-btn.flowing{
  border-color:#63E6FF;
  background:rgba(10,40,60,.85);
  animation:fluxPulse 2s ease-in-out infinite;
  color:#63E6FF;
}
.flux-icon{font-size:1.5rem;line-height:1;}
.flux-txt{font-family:'Cinzel Decorative',serif;font-size:.5rem;letter-spacing:.22em;font-weight:700;}
.flux-state{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;opacity:.8;}

/* ─── FBF Sphere ─────────────────────────────── */
#fbf-btn{
  width:110px;height:110px;border-radius:50%;
  border:3px solid rgba(255,255,255,.7);
  background:radial-gradient(circle at 32% 28%, #FF8EFF, #C084FC, #63E6FF, #86FFC0, #FFE080, #0d0025);
  background-size:300% 300%;
  animation:magicRotate 7s ease-in-out infinite alternate,fbfPulse 3s ease-in-out infinite;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;
  font-family:'Cinzel Decorative',serif;
  transition:transform .25s,box-shadow .25s;
  flex-shrink:0;
}
#fbf-btn:hover{transform:scale(1.12);}
#fbf-btn:active{transform:scale(.94);}
#fbf-btn.flowing{
  border-color:#63E6FF;
  animation:magicRotate 3s ease-in-out infinite alternate,fbfPulse 1.2s ease-in-out infinite;
}
.fbf-label{font-size:1.05rem;font-weight:900;letter-spacing:.22em;color:#fff;text-shadow:0 0 14px rgba(0,0,0,.9),0 0 28px rgba(255,255,255,.7);}
.fbf-hz{font-family:'IM Fell English',serif;font-size:1.1rem;font-weight:bold;color:#fff;text-shadow:0 0 10px rgba(0,0,0,.9);line-height:1;}
.fbf-state{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);text-shadow:0 0 6px rgba(0,0,0,.9);}

/* ─── Step buttons (dans Jeu Aléatoire) ─────── */
.fbf-step{
  padding:.3rem .65rem;min-width:52px;
  border-radius:9px;
  background:rgba(99,230,255,.09);
  border:1.5px solid rgba(99,230,255,.35);
  color:#63E6FF;
  font-family:'IM Fell English',serif;
  font-size:.82rem;font-weight:bold;
  transition:all .14s;text-align:center;
}
.fbf-step:hover{background:rgba(99,230,255,.22);border-color:rgba(99,230,255,.75);transform:scale(1.08);box-shadow:0 0 12px rgba(99,230,255,.4);}
.fbf-step:active{transform:scale(.95);}

/* Grille de steps dans Jeu Aléatoire */
.rand-steps-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;
  padding:.6rem;
  background:rgba(99,230,255,.04);
  border:1px solid rgba(99,230,255,.18);
  border-radius:10px;
}

/* ─── Mini frequency table ───────────────────── */
.fmini-head{font-size:.48rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,155,80,.65);text-align:center;margin-bottom:.35rem;font-style:italic;}
.fmini-row{display:grid;grid-template-columns:6px 1fr 1fr 1fr;gap:.04rem .08rem;align-items:center;padding:.05rem 0;border-bottom:1px solid rgba(200,100,255,.08);}
.fmini-row:last-child{border-bottom:none;}
.fmini-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.fmini-freq{font-size:.66rem;font-weight:bold;font-family:'IM Fell English',serif;opacity:.9;}
.fmini-ratio{font-size:.62rem;font-weight:bold;font-family:'IM Fell English',serif;opacity:.8;text-align:center;}
.fmini-n{font-size:.62rem;font-weight:bold;font-family:'IM Fell English',serif;opacity:.7;text-align:right;}

/* ─── Navigation onglets colorés ────────────── */
.tnav-btn{
  font-family:'Cinzel Decorative',serif;
  font-size:.65rem;letter-spacing:.1em;
  padding:.5rem .9rem;border-radius:20px;
  border:1.5px solid transparent;
  transition:all .2s;
  backdrop-filter:blur(10px);
  white-space:nowrap;font-weight:700;
}

/* Chaque onglet : sa propre couleur de cellule */
.tnav-fx{
  background:rgba(255,140,40,.14);
  border-color:rgba(255,160,60,.45);
  color:rgba(255,180,80,.9);
}
.tnav-fx:hover,.tnav-fx.active{background:rgba(255,140,40,.3);border-color:rgba(255,200,80,.85);color:#FFE080;box-shadow:0 0 18px rgba(255,160,40,.4);}

.tnav-notice{
  background:rgba(30,180,255,.14);
  border-color:rgba(50,200,255,.45);
  color:rgba(100,220,255,.9);
}
.tnav-notice:hover,.tnav-notice.active{background:rgba(30,180,255,.3);border-color:#63E6FF;color:#63E6FF;box-shadow:0 0 18px rgba(30,200,255,.4);}

.tnav-geo{
  background:rgba(200,80,255,.14);
  border-color:rgba(220,100,255,.45);
  color:rgba(220,140,255,.9);
}
.tnav-geo:hover,.tnav-geo.active{background:rgba(200,80,255,.3);border-color:#D29DFF;color:#D29DFF;box-shadow:0 0 18px rgba(180,80,255,.4);}

.tnav-random{
  background:rgba(80,255,160,.12);
  border-color:rgba(80,255,160,.4);
  color:rgba(100,255,180,.9);
}
.tnav-random:hover,.tnav-random.active{background:rgba(80,255,160,.25);border-color:#56FFB0;color:#56FFB0;box-shadow:0 0 18px rgba(80,255,160,.35);}

.tnav-horloge{
  background:rgba(255,200,80,.14);
  border-color:rgba(255,210,80,.45);
  color:rgba(255,220,100,.9);
}
.tnav-horloge:hover,.tnav-horloge.active{background:rgba(255,200,80,.28);border-color:#FFD060;color:#FFD060;box-shadow:0 0 18px rgba(255,200,60,.4);}

/* ─── Paramètres 3D panel (OmCv 477 style) ──── */
.geo-panel-inner{display:flex;flex-direction:column;gap:.4rem;}
.geo-section-title{
  font-family:'Cinzel Decorative',serif;
  font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(200,100,255,.9);
  padding-bottom:.4rem;border-bottom:1px solid rgba(200,100,255,.2);
}
.geometry-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;}
.geometry-btn{
  background:rgba(255,255,255,.04);border:1.5px solid rgba(200,100,255,.22);
  color:rgba(235,220,255,.7);border-radius:7px;padding:.35rem .2rem;
  font-family:'IM Fell English',serif;font-size:.65rem;cursor:pointer;transition:all .2s;text-align:center;line-height:1.2;
}
.geometry-btn:hover{background:rgba(200,100,255,.15);border-color:#F3D9FF;color:#fff;}
.geometry-btn.active{background:rgba(200,100,255,.28);border-color:#F3D9FF;color:#fff;box-shadow:0 0 12px rgba(200,100,255,.45);}

/* Sliders OmCv 477 */
.sl-row{display:flex;flex-direction:column;gap:3px;padding:5px 2px;}
.sl-row label{
  font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(200,180,255,.28);display:flex;justify-content:space-between;
}
.sl-row label span{color:rgba(255,200,80,.65);}
.sl-row input[type=range]{
  width:100%;height:3px;-webkit-appearance:none;
  background:rgba(255,255,255,.09);border-radius:3px;cursor:pointer;outline:none;
}
.sl-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:rgba(255,200,80,.82);cursor:pointer;
}

/* Switches rendu */
.sw-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 3px;font-size:.68rem;border-bottom:1px solid rgba(255,255,255,.04);
  color:rgba(200,180,255,.52);
}
.sw-row:last-of-type{border-bottom:none;}
.sw{
  width:30px;height:16px;border-radius:8px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  cursor:pointer;transition:all .18s;
  -webkit-appearance:none;appearance:none;
  position:relative;flex-shrink:0;
}
.sw:checked{background:rgba(255,200,80,.3);border-color:rgba(255,200,80,.42);}
.sw::after{content:'';width:10px;height:10px;background:rgba(200,180,255,.75);border-radius:50%;position:absolute;top:2px;left:2px;transition:left .18s;}
.sw:checked::after{left:16px;}

/* ─── Status + flow controls (FX panel) ────── */
.status{display:flex;align-items:center;justify-content:center;gap:.8rem;font-size:1.05rem;font-style:italic;letter-spacing:.14em;color:rgba(200,170,255,.65);font-weight:bold;}
.wave-badge{font-family:'IM Fell English',serif;font-size:1rem;font-style:italic;padding:.15rem .6rem;border-radius:12px;border:1.5px solid transparent;transition:all .4s;letter-spacing:.08em;font-weight:bold;}
.wave-badge.live{border-color:currentColor;background:rgba(200,100,255,.15);box-shadow:0 0 12px currentColor;}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(180,100,255,.4);transition:all .5s;flex-shrink:0;}
.dot.live{background:#D29DFF;box-shadow:0 0 14px rgba(200,100,255,.9);animation:blink 2s infinite;}

.flow-row{display:flex;gap:.7rem;width:100%;margin-top:.3rem;}
.btn-flow{
  background:rgba(200,100,255,.1);border:2px solid rgba(200,100,255,.5);color:#F3D9FF;
  padding:.75rem 1.5rem;font-family:'Cinzel Decorative',serif;font-size:.9rem;letter-spacing:.18em;
  text-transform:uppercase;border-radius:8px;cursor:pointer;transition:all .4s;flex:1;
  text-shadow:0 0 12px rgba(200,100,255,.4);font-weight:bold;
}
.btn-flow:hover:not(:disabled){background:rgba(200,100,255,.22);box-shadow:0 0 28px rgba(200,100,255,.4);border-color:#F3D9FF;}
.btn-flow:disabled{opacity:.32;cursor:not-allowed;}

.mvol-wrap{display:flex;flex-direction:column;gap:.45rem;width:100%;}
.mvol-label{font-size:.8rem;font-style:italic;letter-spacing:.16em;text-transform:uppercase;color:rgba(220,190,255,.7);font-weight:bold;}
.mvol-row{display:flex;align-items:center;gap:.8rem;width:100%;}
.mvol-slider{flex:1;cursor:pointer;accent-color:#D29DFF;height:20px;}
.mvol-val{font-family:'IM Fell English',serif;font-size:1.1rem;color:rgba(235,210,255,.85);min-width:40px;text-align:right;font-weight:bold;}

.mfreq-ctrl{display:flex;flex-direction:column;align-items:center;gap:.3rem;background:rgba(200,100,255,.06);border:1.5px solid rgba(200,100,255,.25);border-radius:10px;padding:.5rem .8rem;width:100%;}
.mfreq-label{font-size:.58rem;font-style:italic;letter-spacing:.18em;text-transform:uppercase;color:rgba(220,180,255,.8);font-weight:bold;}
.mfreq-row{display:flex;align-items:center;gap:.5rem;justify-content:center;width:100%;}
.mfreq-btn{width:32px;height:32px;border-radius:50%;background:radial-gradient(circle,rgba(220,100,255,.24) 0%,transparent 100%);border:1.5px solid rgba(220,100,255,.65);color:#F3D9FF;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
.mfreq-btn:hover{border-color:#F3D9FF;box-shadow:0 0 12px rgba(220,100,255,.5);transform:scale(1.1);}
.mfreq-input{width:80px;background:rgba(25,8,48,.85);border:1.5px solid rgba(220,100,255,.35);border-bottom:2.5px solid rgba(220,100,255,.8);color:#F3D9FF;font-family:'IM Fell English',serif;font-size:1.4rem;text-align:center;padding:.12rem .2rem;border-radius:7px;outline:none;-moz-appearance:textfield;font-weight:bold;}
.mfreq-range{font-size:.5rem;font-style:italic;color:rgba(220,180,255,.45);letter-spacing:.1em;}

.delta-sphere-wrap{display:flex;flex-direction:column;align-items:center;gap:.6rem;background:rgba(0,80,255,.07);border:1.5px solid rgba(30,155,255,.38);border-radius:12px;padding:.6rem .8rem;width:100%;}
.delta-sphere-label{font-size:.65rem;font-style:italic;letter-spacing:.16em;text-transform:uppercase;color:rgba(100,195,255,.9);text-align:center;font-weight:bold;}
.delta-sphere-row{display:flex;align-items:center;gap:.8rem;justify-content:center;width:100%;}
.delta-sphere-btn{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,rgba(30,155,255,.22) 0%,transparent 100%);border:1.5px solid rgba(30,155,255,.55);color:#F3D9FF;font-size:1.3rem;font-weight:700;line-height:1;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;}
.delta-sphere-btn:hover{border-color:#63CCFF;transform:scale(1.12);}
.delta-sphere-val{display:flex;flex-direction:column;align-items:center;gap:.2rem;min-width:90px;}
.delta-sphere-num{width:90px;background:rgba(25,8,48,.85);border:1.5px solid rgba(30,155,255,.35);border-bottom:3px solid rgba(30,155,255,.8);color:#F3D9FF;font-family:'IM Fell English',serif;font-size:2rem;text-align:center;padding:.25rem .3rem;border-radius:8px;outline:none;-moz-appearance:textfield;font-weight:bold;}
.delta-sphere-wave{font-family:'IM Fell English',serif;font-size:.95rem;font-style:italic;letter-spacing:.1em;font-weight:bold;color:#63CCFF;}
.delta-sphere-range{font-size:.65rem;font-style:italic;color:rgba(220,190,255,.5);letter-spacing:.1em;}

.btn-reset{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.22);color:rgba(245,240,225,.72);font-size:1.4rem;width:48px;height:48px;border-radius:50%;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;}
.btn-reset:hover{border-color:rgba(255,200,100,.8);color:#FFE080;transform:rotate(-180deg);}

/* ─── FX Panel ───────────────────────────────── */
.fx-panel{display:flex;flex-direction:column;gap:1.2rem;}
.fx-block{background:rgba(255,255,255,.04);border:1.5px solid rgba(200,160,255,.18);border-radius:14px;padding:1rem;display:flex;flex-direction:column;gap:.8rem;}
.fx-title{font-family:'Cinzel Decorative',serif;font-size:.75rem;letter-spacing:.18em;color:#F3D9FF;text-transform:uppercase;border-bottom:1px solid rgba(200,160,255,.2);padding-bottom:.5rem;font-weight:bold;}
.fx-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.fx-control-group{display:flex;align-items:center;gap:.5rem;flex:1;min-width:200px;}
.fx-label{font-size:.8rem;font-style:italic;color:rgba(220,195,255,.8);min-width:80px;font-weight:bold;}
.fx-slider{flex:1;accent-color:#D29DFF;cursor:pointer;height:18px;}
.fx-btn-step{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(200,160,255,.35);background:rgba(12,2,32,.7);color:#F3D9FF;font-size:1rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.fx-btn-step:hover{background:rgba(200,160,255,.2);border-color:#F3D9FF;transform:scale(1.1);}
.fx-val-disp{font-family:'IM Fell English',serif;font-size:.9rem;color:#D29DFF;min-width:42px;text-align:right;font-weight:bold;}

/* ─── Random panel ───────────────────────────── */
.rand-panel{display:flex;flex-direction:column;gap:1rem;}
.btn-magic-rand{width:100%;padding:1rem;border-radius:12px;background:radial-gradient(circle at 30% 30%, rgba(255,142,255,.25), rgba(99,230,255,.15), rgba(134,255,192,.1));border:2px solid rgba(200,100,255,.55);color:#F3D9FF;font-family:'Cinzel Decorative',serif;font-size:1.1rem;letter-spacing:.2em;text-transform:uppercase;font-weight:bold;transition:all .35s;}
.btn-magic-rand:hover{box-shadow:0 0 40px rgba(200,100,255,.5);border-color:#F3D9FF;transform:scale(1.03);}
.btn-magic-rand:active{transform:scale(.97);}
.random-table{display:flex;flex-direction:column;gap:.3rem;}
.rand-row{display:grid;grid-template-columns:8px 1fr 1fr 1fr;gap:.1rem .4rem;align-items:center;padding:.5rem .6rem;border-radius:8px;}
.rand-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rand-freq{font-family:'IM Fell English',serif;font-size:1rem;font-weight:bold;opacity:.95;}
.rand-ratio{font-family:'IM Fell English',serif;font-size:.85rem;opacity:.8;text-align:center;}
.rand-n{font-family:'IM Fell English',serif;font-size:.85rem;opacity:.7;text-align:right;}
.rand-prog-section{display:flex;flex-direction:column;gap:.8rem;}

/* ─── Progression harmonique ─────────────────── */
.prog-wrap{width:100%;background:rgba(255,180,80,.06);border:1.5px solid rgba(255,180,80,.25);border-radius:14px;padding:1rem;display:flex;flex-direction:column;gap:.7rem;}
.prog-title{font-family:'Cinzel Decorative',serif;font-size:.8rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,200,100,.85);text-align:center;font-weight:bold;}
.prog-row{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;justify-content:center;}
.prog-label{font-size:.8rem;font-style:italic;color:rgba(255,210,130,.8);min-width:55px;font-weight:bold;}
.prog-select{flex:1;background:rgba(25,12,2,.85);border:1.5px solid rgba(255,180,80,.35);border-bottom:2.5px solid rgba(255,180,80,.75);color:rgba(255,220,150,1);font-family:'IM Fell English',serif;font-style:italic;font-size:1rem;padding:.35rem .5rem;border-radius:7px;cursor:pointer;outline:none;font-weight:bold;}
.prog-mode-row{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;}
.prog-mode-btn{font-family:'IM Fell English',serif;font-size:.8rem;font-style:italic;padding:.3rem .8rem;border-radius:14px;cursor:pointer;border:1.5px solid rgba(255,180,80,.35);background:rgba(255,180,80,.07);color:rgba(255,210,130,.75);transition:all .2s;font-weight:bold;}
.prog-mode-btn:hover{background:rgba(255,180,80,.18);color:#FFE080;}
.prog-mode-btn.active{background:rgba(255,180,80,.25);border-color:rgba(255,180,80,.8);color:#FFD080;box-shadow:0 0 12px rgba(255,160,40,.3);}
.prog-range-row{display:flex;align-items:center;gap:.5rem;justify-content:center;flex-wrap:wrap;}
.prog-range-input{width:80px;background:rgba(25,12,2,.85);border:1.5px solid rgba(255,180,80,.35);border-bottom:2.5px solid rgba(255,180,80,.75);color:rgba(255,220,150,1);font-family:'IM Fell English',serif;font-size:1.1rem;text-align:center;padding:.3rem .4rem;border-radius:7px;outline:none;-moz-appearance:textfield;font-weight:bold;}
.prog-freq-display{font-family:'IM Fell English',serif;font-size:1rem;color:rgba(255,220,130,.7);text-align:center;letter-spacing:.1em;font-style:italic;min-height:1.4rem;transition:color .3s;font-weight:bold;}
.prog-freq-display.active{color:rgba(255,200,80,1);text-shadow:0 0 10px rgba(255,180,60,.4);}
.btn-prog{background:rgba(255,180,80,.1);border:1.5px solid rgba(255,180,80,.55);color:#FFD080;font-family:'Cinzel Decorative',serif;font-size:.85rem;letter-spacing:.16em;padding:.7rem 1.8rem;border-radius:6px;cursor:pointer;transition:all .3s;display:block;margin:0 auto;font-weight:bold;}
.btn-prog:hover{background:rgba(255,180,80,.22);box-shadow:0 0 20px rgba(255,160,40,.3);border-color:#FFE080;}
.btn-prog.running{background:rgba(255,100,60,.16);border-color:rgba(255,120,60,.7);color:#FFB080;animation:prog-pulse 2s ease-in-out infinite;}

/* ─── Horloge UT432 ──────────────────────────── */
.h432-panel{display:flex;flex-direction:column;align-items:center;gap:1.4rem;padding:.5rem 0;}
.h432-display{
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  padding:1.5rem 2rem;
  background:radial-gradient(ellipse at 50% 40%,rgba(255,200,60,.08),rgba(8,0,26,.0));
  border:1.5px solid rgba(255,200,60,.22);border-radius:18px;width:100%;
}
.h432-num{
  font-family:'Cinzel Decorative',serif;
  font-size:3.5rem;font-weight:400;letter-spacing:.05em;line-height:1;
  transition:color .8s,text-shadow .8s;
  animation:ut432Glow 4s ease-in-out infinite;
}
.h432-seuil{font-family:'Cinzel Decorative',serif;font-size:.7rem;letter-spacing:.42em;text-transform:uppercase;opacity:.6;margin-top:.2em;transition:color .8s;}
.h432-bar-wrap{width:100%;}
.h432-bar-bg{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.h432-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#FF8EFF,#63E6FF,#FFD060);transition:width .8s linear;}
.h432-bar-labels{display:flex;justify-content:space-between;font-size:.48rem;color:rgba(200,180,255,.3);letter-spacing:.12em;margin-top:.25rem;}
.h432-civil{font-family:'IM Fell English',serif;font-size:1.4rem;letter-spacing:.18em;color:rgba(200,180,255,.35);font-style:italic;}
.btn-h432{
  width:100%;padding:1.1rem;border-radius:14px;
  background:radial-gradient(ellipse at 30% 30%,rgba(255,200,60,.2),rgba(255,140,40,.1),transparent);
  border:2px solid rgba(255,200,60,.5);
  color:#FFD060;
  font-family:'Cinzel Decorative',serif;font-size:1rem;letter-spacing:.2em;font-weight:700;
  transition:all .35s;text-transform:uppercase;
}
.btn-h432:hover{box-shadow:0 0 40px rgba(255,200,60,.4);border-color:#FFD060;transform:scale(1.03);}
.btn-h432:active{transform:scale(.97);}
.h432-desc{
  font-family:'IM Fell English',serif;font-size:.78rem;font-style:italic;
  color:rgba(200,180,255,.38);line-height:1.7;text-align:center;
  display:flex;flex-direction:column;gap:.5rem;
}

/* ─── Bouton Fullscreen ──────────────────────── */
.tnav-fullscreen{
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.25);
  color:rgba(230,230,255,.7);
  font-size:1.05rem;
  padding:.45rem .75rem;
  min-width:38px;
}
.tnav-fullscreen:hover{
  background:rgba(255,255,255,.14);
  border-color:rgba(255,255,255,.6);

  box-shadow:0 0 16px rgba(200,180,255,.3);
}

/* ─── Navigation — colonne dans #right-dock ─── */
#tab-nav{
  display:flex;flex-direction:column;
  gap:.32rem;
  padding:.42rem .32rem;
  background:rgba(2,1,14,.92);
  border:1px solid rgba(200,100,255,.18);
  border-radius:20px;
  backdrop-filter:blur(20px);
  box-shadow:0 0 32px rgba(130,60,200,.14),inset 0 0 18px rgba(200,100,255,.04);
  white-space:nowrap;
}
#tab-nav .tnav-btn{
  font-size:.68rem;
  padding:.46rem .78rem;
  text-align:center;
}

/* ─── Note méditation (panel 3D) ─────────────── */
.geo-med-note{
  font-family:'IM Fell English',serif;
  font-size:.82rem;font-style:italic;
  color:rgba(200,180,255,.55);
  line-height:1.8;text-align:center;
  padding:1rem;
  margin-top:.4rem;
  border:1px solid rgba(200,100,255,.12);
  border-radius:10px;
  background:rgba(200,100,255,.04);

/* ═══════════════════════════════════════════════
   Interface Omcha-style — toolbar, panels, infobar
   ═══════════════════════════════════════════════ */

/* En-tête haut gauche */
#hdr{position:fixed;top:18px;left:24px;z-index:100;pointer-events:none;}
#hdr-title{
  font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;
  color:#00ccff;letter-spacing:.08em;
  text-shadow:0 0 30px rgba(0,204,255,.5),0 0 60px rgba(0,204,255,.2);
}
#hdr-sub{
  font-family:'IM Fell English',serif;font-size:9px;letter-spacing:.28em;
  opacity:.4;text-transform:uppercase;margin-top:3px;color:#7a9ab0;
}
#hdr-freq{
  font-family:'IM Fell English',serif;font-size:10px;
  color:#e8a020;opacity:.65;margin-top:2px;letter-spacing:.07em;font-style:italic;
}

/* Toolbar haut droite */
#toolbar{
  position:fixed;top:18px;right:18px;
  display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;
  z-index:100;pointer-events:auto;max-width:600px;
}
.tbtn{
  font-family:'IM Fell English',serif;font-size:10px;letter-spacing:.14em;
  padding:7px 11px;cursor:pointer;text-transform:uppercase;border-radius:2px;
  transition:all .18s;background:rgba(1,3,6,.92);
  border:1px solid rgba(0,204,255,.2);color:#00ccff;
  backdrop-filter:blur(10px);white-space:nowrap;
}
.tbtn:hover{background:rgba(0,204,255,.1);border-color:rgba(0,204,255,.5);}
.tbtn.on{background:rgba(0,204,255,.14);border-color:rgba(0,204,255,.7);color:#fff;}

/* Panneaux flottants gauche */
.pan-left{
  position:fixed;top:66px;left:18px;width:215px;
  max-height:calc(100vh - 90px);overflow-y:auto;scrollbar-width:none;
  background:rgba(1,3,6,.95);border:1px solid rgba(0,204,255,.14);
  border-radius:3px;padding:13px;pointer-events:auto;
  backdrop-filter:blur(14px);display:none;z-index:80;
}
.pan-left.open{display:block;}
.pan-left::-webkit-scrollbar{display:none;}

/* Panneaux flottants droite */
.pan-right{
  position:fixed;top:66px;right:18px;width:260px;
  max-height:calc(100vh - 90px);overflow-y:auto;scrollbar-width:none;
  background:rgba(1,3,6,.95);border:1px solid rgba(0,204,255,.14);
  border-radius:3px;padding:13px;pointer-events:auto;
  backdrop-filter:blur(14px);display:none;z-index:80;
}
.pan-right.open{display:block;}
.pan-right::-webkit-scrollbar{display:none;}

/* Section header dans les panels */
.pct{
  font-family:'IM Fell English',serif;
  font-size:8px;letter-spacing:.28em;text-transform:uppercase;
  color:#00ccff;opacity:.55;margin-bottom:9px;
}

/* Sliders dans pan-left (thème cyan) */
.pan-left .sl-row label{color:rgba(0,204,255,.62);}
.pan-left .sl-row label span{color:#ddeeff;}
.pan-left .sl-row input[type=range]{background:rgba(0,204,255,.1);}
.pan-left .sl-row input[type=range]::-webkit-slider-thumb{background:#00ccff;}
.pan-left .sw-row{color:rgba(0,204,255,.62);font-size:.68rem;}
.pan-left .sw:checked{background:rgba(0,204,255,.3);border-color:rgba(0,204,255,.5);}
.pan-left .sw::after{background:rgba(0,204,255,.75);}

/* Infobar bas */
#infobar{
  position:fixed;bottom:18px;left:18px;right:18px;
  display:flex;justify-content:space-between;align-items:flex-end;
  pointer-events:none;z-index:80;
}
.ib{
  background:rgba(1,3,6,.82);border:1px solid rgba(0,204,255,.08);
  padding:7px 12px;border-radius:2px;backdrop-filter:blur(8px);
}
.ib-k{
  font-family:'IM Fell English',serif;
  font-size:7px;letter-spacing:.22em;opacity:.38;
  text-transform:uppercase;color:#7a9ab0;
}
.ib-v{
  font-family:'IM Fell English',serif;
  font-size:12px;color:#ddeeff;margin-top:2px;
}
.ib-live{color:#00ff88;}
.ib-off{color:rgba(200,100,255,.5);}

/* ── HUD minuterie flottant ───────────────────── */
#ses-timer-hud{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  z-index:95;cursor:pointer;display:none;
  align-items:center;justify-content:center;
  width:56px;height:56px;
  filter:drop-shadow(0 0 10px rgba(200,100,255,.35));
  transition:opacity .4s;
}
#ses-timer-hud:hover{filter:drop-shadow(0 0 18px rgba(200,100,255,.7));}
#ses-timer-hud.active{display:flex;animation:hudBreath 4s ease-in-out infinite;}
#timer-hud-pct{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel Decorative',serif;font-size:.56rem;letter-spacing:.06em;
  color:#86FFC0;pointer-events:none;
}
@keyframes hudBreath{
  0%,100%{filter:drop-shadow(0 0 8px rgba(200,100,255,.3));}
  50%{filter:drop-shadow(0 0 20px rgba(200,100,255,.65));}
}

/* ── FX panel — éléments supplémentaires ──────── */

/* EQ 3 bandes grille */
.fx-eq-grid{
  display:grid;
  grid-template-columns:2.2rem 1fr 3rem 1fr 3rem;
  gap:.3rem .5rem;align-items:center;
}
.fx-eq-band{
  font-family:'Cinzel Decorative',serif;font-size:.6rem;
  letter-spacing:.12em;color:#C0AAFF;text-align:right;padding-right:.3rem;
}

/* Toggle switch */
.fx-toggle{position:relative;display:inline-block;width:38px;height:20px;cursor:pointer;flex-shrink:0;}
.fx-toggle input{opacity:0;width:0;height:0;}
.fx-tog-track{
  position:absolute;inset:0;border-radius:20px;
  background:rgba(200,160,255,.15);border:1.5px solid rgba(200,160,255,.3);
  transition:.25s;
}
.fx-tog-track::before{
  content:'';position:absolute;width:14px;height:14px;border-radius:50%;
  background:rgba(200,160,255,.5);top:2px;left:2px;transition:.25s;
}
.fx-toggle input:checked + .fx-tog-track{
  background:rgba(180,100,255,.35);border-color:#D29DFF;
}
.fx-toggle input:checked + .fx-tog-track::before{
  transform:translateX(18px);background:#D29DFF;
  box-shadow:0 0 8px rgba(200,100,255,.6);
}

/* Réverbe spatiale */
.fx-space-btns{display:flex;gap:.35rem;flex-wrap:wrap;}
.fx-space-btn{
  flex:1;padding:.38rem .3rem;border-radius:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(200,160,255,.25);
  font-family:'IM Fell English',serif;font-size:.78rem;font-style:italic;
  color:rgba(230,200,255,.75);cursor:pointer;transition:.18s;
  letter-spacing:.04em;text-align:center;
}
.fx-space-btn:hover{background:rgba(200,100,255,.18);border-color:#C0AAFF;color:#F3D9FF;}
.fx-space-btn.active{background:rgba(200,100,255,.22);border-color:#D29DFF;color:#FFF;}

/* Minuterie */
.fx-timer-presets{display:flex;gap:.3rem;margin-bottom:.5rem;}
.fx-timer-btn{
  flex:1;padding:.35rem 0;border-radius:8px;cursor:pointer;
  border:1px solid rgba(200,160,255,.28);background:rgba(12,2,32,.5);
  font-family:'Cinzel Decorative',serif;font-size:.65rem;letter-spacing:.1em;
  color:rgba(200,170,255,.75);transition:.18s;
}
.fx-timer-btn:hover{background:rgba(200,100,255,.16);border-color:#C0AAFF;color:#F3D9FF;}
.fx-timer-btn.active{background:rgba(200,100,255,.22);border-color:#D29DFF;color:#FFF;}

.fx-timer-row{display:flex;align-items:center;gap:.6rem;}
.fx-timer-display{
  font-family:'Cinzel Decorative',serif;font-size:1.35rem;
  color:#D29DFF;letter-spacing:.12em;flex:1;text-align:center;
  background:rgba(12,2,32,.5);border:1px solid rgba(200,160,255,.18);
  border-radius:10px;padding:.4rem;
  text-shadow:0 0 18px rgba(200,100,255,.5);
}
.fx-timer-start{
  padding:.4rem .75rem;border-radius:10px;cursor:pointer;
  border:1.5px solid rgba(134,255,192,.4);background:rgba(134,255,192,.06);
  font-family:'Cinzel Decorative',serif;font-size:.65rem;letter-spacing:.1em;
  color:#86FFC0;transition:.18s;white-space:nowrap;
}
.fx-timer-start:hover{background:rgba(134,255,192,.18);border-color:#86FFC0;}

/* Presets sessions */
.fx-presets-list{display:flex;flex-direction:column;gap:.35rem;}
.fx-preset-row{
  display:flex;align-items:center;gap:.4rem;
  background:rgba(12,2,32,.4);border:1px solid rgba(200,160,255,.16);
  border-radius:8px;padding:.35rem .5rem;
}
.fx-preset-name{
  flex:1;font-family:'IM Fell English',serif;font-size:.82rem;font-style:italic;
  color:rgba(200,175,255,.7);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.fx-preset-btn{
  width:26px;height:26px;border-radius:6px;cursor:pointer;
  font-size:.72rem;display:flex;align-items:center;justify-content:center;transition:.15s;
}
.fx-preset-btn.load{border:1px solid rgba(134,255,192,.35);color:#86FFC0;background:rgba(134,255,192,.05);}
.fx-preset-btn.load:hover:not(:disabled){background:rgba(134,255,192,.2);border-color:#86FFC0;}
.fx-preset-btn.save{border:1px solid rgba(200,100,255,.35);color:#C084FC;background:rgba(200,100,255,.06);}
.fx-preset-btn.save:hover{background:rgba(200,100,255,.2);border-color:#D29DFF;}
.fx-preset-btn.del{border:1px solid rgba(255,100,100,.28);color:#FF8E8E;background:rgba(255,100,100,.04);}
.fx-preset-btn.del:hover:not(:disabled){background:rgba(255,100,100,.18);border-color:#FF8E8E;}
.fx-preset-btn:disabled{opacity:.28;cursor:default;}

/* ═══════════════════════════════════════════
   04-ui.css — Paires oscillateurs, presets, notice, accordéon
   ═══════════════════════════════════════════ */

/* Panneaux des Paires (dans le modal oscillateur) */
.pair-panel{
  background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.12);
  border-left:6px solid transparent;border-radius:16px;padding:1.2rem 1.4rem;
  display:flex;flex-direction:column;gap:1rem;
  backdrop-filter:blur(8px);
}
.pair-head{display:flex;align-items:center;gap:.7rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.12);}
.pair-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.pair-name{font-family:'Cinzel Decorative',serif;font-size:1rem;letter-spacing:.12em;flex:1;font-weight:bold;}
.pair-mute-p,.pair-mute-i{
  font-family:inherit;font-size:.85rem;padding:.28rem .7rem;border-radius:6px;cursor:pointer;
  transition:all .2s;letter-spacing:.06em;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.22);
  color:rgba(245,240,225,.8);font-weight:bold;
}
.pair-mute-p:hover,.pair-mute-i:hover{border-color:rgba(255,255,255,.55);color:#fff;}
.pair-mute-p.muted,.pair-mute-i.muted{background:rgba(220,60,60,.14);border-color:rgba(220,70,70,.45);color:rgba(255,150,130,.9);}
.btn-activer{
  background:rgba(120,220,60,.09);border:1.5px solid rgba(120,220,60,.42);
  color:rgba(150,240,90,.85);font-family:inherit;font-size:.85rem;
  padding:.28rem .7rem;border-radius:6px;cursor:pointer;transition:all .2s;font-weight:bold;
}
.btn-activer:hover{background:rgba(120,220,60,.2);border-color:rgba(120,220,60,.75);color:#b2ff59;}

/* Formules */
.block-formula{
  display:flex;align-items:baseline;gap:.35rem;flex-wrap:wrap;
  font-family:'IM Fell English',serif;font-style:italic;font-size:1.1rem;
  padding:.35rem .55rem;background:rgba(0,0,0,.28);border-radius:8px;
  border:1.1px solid rgba(255,255,255,.06);
}
.bf-sym{color:rgba(210,190,255,.5);font-style:normal;font-size:.95rem;margin:0 .1rem;}
.bf-master,.bf-ratio,.bf-n{color:rgba(235,215,255,1);font-weight:bold;}
.bf-result{color:#F3D9FF;font-size:1.3rem;font-style:normal;margin-left:.18rem;font-weight:bold;}
.bf-link{color:rgba(170,215,255,1);font-weight:bold;}
.bf-delta{color:rgba(235,215,255,1);font-weight:bold;}

/* Accordéon */
.accord-header{display:flex;align-items:center;gap:.5rem;cursor:pointer;padding:.45rem .55rem;border-radius:6px;transition:background .18s;user-select:none;}
.accord-header:hover{background:rgba(255,255,255,.07);}
.accord-arrow{font-size:.85rem;transition:transform .22s;color:rgba(255,255,255,.4);}
.accord-arrow.open{transform:rotate(90deg);}
.accord-body{overflow:hidden;transition:max-height .3s ease,opacity .2s;max-height:0;opacity:0;}
.accord-body.open{max-height:700px;opacity:1;}

/* Contrôles individuels par paire */
.bctrl{display:flex;flex-direction:column;gap:.28rem;}
.bctrl-row{display:flex;align-items:center;justify-content:space-between;gap:.4rem;}
.bctrl-label{font-size:.8rem;font-style:italic;letter-spacing:.12em;text-transform:uppercase;color:rgba(220,190,255,.65);font-weight:bold;}
.wave-state{font-family:'IM Fell English',serif;font-size:.85rem;font-style:italic;letter-spacing:.1em;transition:color .3s;flex-shrink:0;font-weight:bold;}
select.bsel{
  width:100%;background:rgba(25,10,50,.85);border:1.5px solid rgba(180,120,255,.32);
  color:rgba(240,230,255,.95);font-family:'IM Fell English',serif;font-style:italic;font-size:1rem;
  padding:.38rem .55rem;border-radius:8px;cursor:pointer;outline:none;font-weight:bold;
}
select.bsel option{background:#17032b;color:#f5eedc;}
input[type="range"].brange{width:100%;cursor:pointer;height:22px;}

/* Paramètres */
.param-row{display:flex;align-items:center;gap:.7rem;}
.param-label{font-size:.9rem;font-style:italic;color:rgba(220,190,255,.65);letter-spacing:.1em;min-width:38px;font-weight:bold;}
input.param-input{
  width:95px;background:rgba(25,10,50,.85);
  border:1.5px solid rgba(180,120,255,.3);border-bottom:3px solid rgba(220,140,255,.55);
  color:#F3D9FF;font-family:'IM Fell English',serif;font-style:italic;font-size:1.2rem;
  text-align:center;padding:.28rem .35rem;border-radius:6px;
  outline:none;-moz-appearance:textfield;font-weight:bold;
}
.param-hint{font-size:.72rem;font-style:italic;color:rgba(220,190,255,.42);}
.polarity-btn{
  background:rgba(255,255,255,.09);border:1.5px solid rgba(200,160,255,.35);
  color:rgba(240,220,255,.85);font-family:'IM Fell English',serif;
  font-size:1.1rem;width:32px;height:32px;border-radius:50%;
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;font-weight:bold;
}
.polarity-btn:hover{border-color:#F3D9FF;color:#fff;}
.polarity-btn.negative{color:#FFB0B0;border-color:rgba(255,160,160,.5);}

/* Notice */
.notice-panel{display:flex;flex-direction:column;gap:1rem;}
.notice-h1{
  font-family:'Cinzel Decorative',serif;font-size:1.1rem;letter-spacing:.18em;
  text-align:center;
  background:linear-gradient(90deg,#FF8EFF,#63E6FF,#86FFC0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.3rem;font-weight:bold;
}
.notice-block{
  background:rgba(255,255,255,.04);border-left:4px solid rgba(200,100,255,.42);
  border-radius:0 12px 12px 0;padding:.8rem 1rem;
  display:flex;flex-direction:column;gap:.35rem;
}
.notice-term{font-family:'Cinzel Decorative',serif;font-size:.78rem;letter-spacing:.14em;color:rgba(200,100,255,1);text-transform:uppercase;font-weight:bold;}
.notice-def{font-size:.9rem;font-style:italic;color:rgba(235,225,255,.8);line-height:1.6;}

/* Presets */
.preset-panel{display:flex;flex-direction:column;gap:1.2rem;}
.preset-intro{font-size:.9rem;font-style:italic;color:rgba(220,200,255,.65);text-align:center;letter-spacing:.1em;line-height:1.6;font-weight:bold;}
.preset-section-title{
  font-family:'Cinzel Decorative',serif;font-size:.72rem;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(220,180,255,.75);
  display:flex;align-items:center;gap:.7rem;font-weight:bold;
}
.preset-section-title::before,.preset-section-title::after{content:'';flex:1;height:1px;background:rgba(200,140,255,.22);}
.preset-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(60px, 1fr));gap:.4rem;}
.preset-freq-btn{display:flex;flex-direction:column;align-items:center;gap:.1rem;padding:.55rem .25rem;border-radius:9px;cursor:pointer;border:1.5px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);transition:all .18s;}
.preset-freq-btn:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.42);transform:scale(1.07);}
.preset-freq-btn.active{border-color:rgba(220,140,255,1);background:rgba(200,100,255,.22);box-shadow:0 0 14px rgba(200,100,255,.3);}
.preset-freq-hz{font-family:'IM Fell English',serif;font-size:1.1rem;color:#f5eedc;line-height:1;font-weight:bold;}
.preset-freq-label{font-size:.6rem;font-style:italic;color:rgba(220,190,255,.55);letter-spacing:.08em;font-weight:bold;}
.btn-preset-launch{
  background:rgba(200,100,255,.12);border:2px solid rgba(200,100,255,.5);
  color:#F3D9FF;font-family:'Cinzel Decorative',serif;font-size:.9rem;
  letter-spacing:.18em;padding:.8rem 2rem;border-radius:6px;
  cursor:pointer;transition:all .3s;margin:0 auto;display:block;font-weight:bold;
}
.btn-preset-launch:hover{background:rgba(200,100,255,.24);box-shadow:0 0 28px rgba(200,100,255,.32);border-color:#F3D9FF;}

/* ═══════════════════════════════════════════
   05-mobile.css — Mobile smartphone
   ═══════════════════════════════════════════ */

/* Overlay portrait (conservé pour compat, non affiché) */
#rotate-overlay { display: none !important; }

/* ═══ Smartphone ═══════════════════════════════════════════════════ */
@media (max-width: 900px), (max-height: 500px) {

  /* Panels ouverts : plein écran gauche (au-dessus de la nav bas) */
  .pan-right.open {
    position: fixed !important;
    right: 0 !important;
    top: 0 !important;
    width: 100vw !important;
    max-width: 340px !important;
    height: calc(100vh - 62px) !important;
    max-height: calc(100vh - 62px) !important;
    border-radius: 0 !important;
    padding: 14px 12px !important;
    overflow-y: auto !important;
    z-index: 80 !important;
  }

  /* Sphère : légèrement plus haute sur très petit écran */
  @media (max-height: 560px) {
    #fbf-sphere-wrap {
      transform: translate(-50%, -52%) !important;
    }
  }

  /* Masquer éléments desktop inutiles */
  #hdr       { display: none !important; }
  #freq-mini { display: none !important; }
  #infobar   { display: none !important; }
  #right-dock { display: none !important; }
}

<script>
/* ═══════════════════════════════════════════
   01-config.js — Constantes, données, helpers
   ═══════════════════════════════════════════ */

const FADE   = 1.6;
const TUNE_T = 0.08;
const LS_KEY = 'fbf396_state';

const HEX_DEG    = [0, 60, 120, 180, 240, 300];
const MASTER_IDX = 6;

// 12 couleurs de la sphère (cycle à chaque trigger)
const SPHERE_COLORS_12 = [
  '#FF6B6B', '#FF9A4A', '#FFD060', '#C8FF60',
  '#56FFB0', '#60D8FF', '#7080FF', '#C080FF',
  '#FF80D0', '#FF4488', '#80FFFF', '#F0D9FF'
];
let _sphereColorIdx = 0;

const RATIO_OPTS = [
  {r:9/10,  l:'9/10'},
  {r:10/9,  l:'10/9'},
  {r:11/10, l:'11/10'},
  {r:10/11, l:'10/11'},
  {r:12/11, l:'12/11'},
  {r:11/12, l:'11/12'},
  {r:10/12, l:'10/12'},
  {r:12/10, l:'12/10'},
  {r:13/12, l:'13/12'},
  {r:12/13, l:'12/13'}
];

// Band A : 36–108 Hz  (oscs 0,1)
// Band B : 108–256 Hz (oscs 2,3)
// Band C : 256–432 Hz (oscs 4,5)
// Maître : variable   (osc 6)
const PAIRS = [
  { label:'Band A·1', color:'#FF6B6B', grad:['#FF6B6B','#FF9A8B'],
    pingala:{id:'p0', ri:2, n:0.3, baseFreq:63,  vol:.12}, ida:{id:'i0', delta:1.8, polarity:1, vol:.12} },
  { label:'Band A·2', color:'#FFB347', grad:['#FFB347','#FFD080'],
    pingala:{id:'p1', ri:2, n:0.6, baseFreq:81,  vol:.12}, ida:{id:'i1', delta:1.8, polarity:1, vol:.12} },
  { label:'Band B·1', color:'#E8FF60', grad:['#E8FF60','#C8FF80'],
    pingala:{id:'p2', ri:2, n:1.2, baseFreq:162, vol:.12}, ida:{id:'i2', delta:1.8, polarity:1, vol:.12} },
  { label:'Band B·2', color:'#56FFB0', grad:['#56FFB0','#80FFD0'],
    pingala:{id:'p3', ri:2, n:1.8, baseFreq:192, vol:.12}, ida:{id:'i3', delta:1.8, polarity:1, vol:.12} },
  { label:'Band C·1', color:'#60D8FF', grad:['#60D8FF','#80B0FF'],
    pingala:{id:'p4', ri:2, n:2.5, baseFreq:288, vol:.12}, ida:{id:'i4', delta:1.8, polarity:1, vol:.12} },
  { label:'Band C·2', color:'#C080FF', grad:['#C080FF','#E080FF'],
    pingala:{id:'p5', ri:2, n:2.9, baseFreq:324, vol:.12}, ida:{id:'i5', delta:1.8, polarity:1, vol:.12} },
  { label:'Maître',   color:'#FFB0FF', grad:['#FFB0FF','#FF80C0'],
    pingala:{id:'p6', ri:0, n:1.0, baseFreq:252, vol:.14}, ida:{id:'i6', delta:1.8, polarity:1, vol:.14} },
];

let mutedOscs = {};
PAIRS.forEach(p => {
  mutedOscs[p.pingala.id] = false;
  mutedOscs[p.ida.id]     = false;
});

let masterFreq  = 252;
let globalDelta = 1.8;
let masterVol   = 0.8;

function waveState(hz) {
  const a = Math.abs(hz);
  if (a < 0.5) return {s:'—',     c:'rgba(200,200,255,.4)'};
  if (a <= 4)  return {s:'Delta', c:'#C890FF'};
  if (a <= 8)  return {s:'Thêta', c:'#F5D460'};
  if (a <= 13) return {s:'Alpha', c:'#56FFB0'};
  if (a <= 30) return {s:'Bêta',  c:'#60D8FF'};
  return              {s:'Gamma', c:'#FF9A8B'};
}

// calcPFreq utilise baseFreq pour les bandes, masterFreq pour le maître
function calcPFreq(i) {
  if (i === MASTER_IDX) return Math.min(648, masterFreq);
  return Math.max(36, Math.min(432, PAIRS[i].pingala.baseFreq));
}
function calcIFreq(i) {
  const { ida } = PAIRS[i];
  return Math.max(36, Math.min(648, calcPFreq(i) + ida.polarity * ida.delta));
}
function safeF(f)    { return Math.max(36, Math.min(648, f)); }
function fmtFreq(f)  { return f.toFixed(1) + ' Hz'; }
function fmtShort(f) { return f.toFixed(1); }


/* ═══════════════════════════════════════════
   02-audio.js — Moteur audio NATIF (Web Audio API pur)
   Migration Tone.js → natif. API publique inchangée :
   buildOsc, tuneOsc, releaseOsc, swap*, initFXChain, setReverbSpace,
   lfo*, breath*, setComp*, playBell, startFlow, stopFlow,
   masterTick. Variables globales eqLow…limiter conservées (blocs 03-08).
   ═══════════════════════════════════════════ */

/* ---------- 2.0 · HORLOGE AUDIO CENTRALE (partagée bols + offline) ---------- */
// Un seul AudioContext natif pour tout le moteur. window.AC l'expose au
// bloc bols (08) pour partager l'horloge. Buffer 'playback' = anti-underrun BT.
let AC = null;
function audioCtx() {
  if (!AC) {
    const C = window.AudioContext || window.webkitAudioContext;
    AC = new C({ latencyHint: 'playback' });
    window.AC = AC;
  }
  return AC;
}
const aNow = () => audioCtx().currentTime;   // remplace Tone.now()

const swapTimers = {};
let nodes = {}, masterGain = null, analyser = null;

let limiter = null;
let eqLow = null, eqMid = null, eqHigh = null;
let masterDelay = null, masterDelayFb = null;
let masterReverb = null, reverbWetGain = null, reverbDryGain = null;
let pingPongDelay = null, ppL = null, ppR = null, ppFb = null, ppMerge = null, ppWet = null;
let compressor = null;
// ── Rack master (style DB4) : trim → EQ 3B → glue → fader → limiteur ──
let busTrim = null, mEqLow = null, mEqMid = null, mEqHigh = null, masterGlue = null, masterFader = null;
let _fxInput = null;          // point d'entrée de la chaîne FX (= ancien eqLow.in)
const LFO_STATE    = {on:false, rate:.25,  depth:.08};
const BREATH_STATE = {on:false, rate:0.13, depth:0.35};
let _lfoNode = null, _lfoGain = null, _lfoDepthGain = null;
let _breathLFO = null, _breathGain = null, _breathDepthGain = null;
let _btKeepalive = null;
let _fadeDur = 2;
let metaAngle = 0, masterRAF = null;
let _waveBuf = null;          // buffer de lecture de l'analyser
let _spectroidBuf = null;     // buffer dédié au rendu du spectroïde 2D

/* ---------- 2.1 · OSCILLATEURS (persistants, retune lisse) ---------- */
// ── Bus delay stéréo (ping-pong) pour les fréquences > 432 ──────────
// Construit une seule fois ; partagé par tous les oscillateurs aigus.
let hiDelayBus = null;
function ensureHiDelay() {
  if (hiDelayBus) return hiDelayBus;
  if (!masterGain) return null;
  const c = audioCtx();
  hiDelayBus = c.createGain(); hiDelayBus.gain.value = 1;
  const dL = c.createDelay(1.0); dL.delayTime.value = 0.18;
  const dR = c.createDelay(1.0); dR.delayTime.value = 0.27;
  const fbL = c.createGain(); fbL.gain.value = 0.30;
  const fbR = c.createGain(); fbR.gain.value = 0.30;
  const panL = c.createStereoPanner(); panL.pan.value = -0.85;
  const panR = c.createStereoPanner(); panR.pan.value =  0.85;
  const outG = c.createGain(); outG.gain.value = 0.5;
  hiDelayBus.connect(dL); hiDelayBus.connect(dR);
  dL.connect(fbL); fbL.connect(dR);   // ping-pong croisé L→R
  dR.connect(fbR); fbR.connect(dL);   //               R→L
  dL.connect(panL); dR.connect(panR);
  panL.connect(outG); panR.connect(outG);
  outG.connect(masterGain);
  return hiDelayBus;
}
// Fréquences > 432 : HPF engagé + réduction de volume + envoi delay stéréo.
function applyHiBand(node, freq) {
  if (!node) return;
  const hi = freq > 432, now = aNow();
  try {
    if (node.hpf)    node.hpf.frequency.setTargetAtTime(hi ? 420 : 20, now, 0.05);
    if (node.hiTrim) node.hiTrim.gain.setTargetAtTime(hi ? 0.75 : 1.0, now, 0.08); // -25% sur 432-648
    if (node.dSend)  node.dSend.gain.setTargetAtTime(hi ? 0.40 : 0.0, now, 0.08);
  } catch(e) {}
}

function buildOsc(id, freq, vol, pan) {
  const c = audioCtx();
  const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = safeF(freq);
  const p = c.createStereoPanner(); p.pan.value = pan;
  const hpf = c.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 20; hpf.Q.value = 0.707;
  const g = c.createGain(); g.gain.value = 0;
  const hiTrim = c.createGain(); hiTrim.gain.value = 1;
  // o → pan → HPF → gain (géré par l'anti-crack) → hiTrim → master
  o.connect(p); p.connect(hpf); hpf.connect(g); g.connect(hiTrim); hiTrim.connect(masterGain);
  // envoi parallèle vers le delay stéréo (ouvert seulement si freq > 432)
  const dSend = c.createGain(); dSend.gain.value = 0; hiTrim.connect(dSend);
  const bus = ensureHiDelay(); if (bus) dSend.connect(bus);
  o.start();
  const node = { o, g, p, hpf, hiTrim, dSend };
  applyHiBand(node, safeF(freq));
  if (!mutedOscs[id] && vol > 0) {
    const now = c.currentTime;
    g.gain.cancelScheduledValues(now);
    g.gain.setValueAtTime(0, now);
    g.gain.setTargetAtTime(vol, now, FADE / 5);
  }
  return node;
}

function tuneOsc(id, freq) {
  const node = nodes[id]; if (!node) return;
  try {
    const f = safeF(freq), now = aNow();
    node.o.frequency.cancelScheduledValues(now);
    node.o.frequency.setValueAtTime(node.o.frequency.value, now);
    node.o.frequency.exponentialRampToValueAtTime(Math.max(1, f), now + TUNE_T);
    applyHiBand(node, f);   // met à jour HPF / volume / delay selon la cible
  } catch(e) {}
}

function releaseOsc(node) {
  try {
    const now = aNow();
    node.g.gain.cancelScheduledValues(now);
    node.g.gain.setValueAtTime(node.g.gain.value, now);
    node.g.gain.setTargetAtTime(0, now, FADE / 5);
    node.o.stop(now + FADE + 0.1);
  } catch(e) {}
  setTimeout(() => {
    try {
      node.o.disconnect(); node.g.disconnect(); node.p.disconnect();
      if (node.hpf) node.hpf.disconnect();
      if (node.hiTrim) node.hiTrim.disconnect();
      if (node.dSend) node.dSend.disconnect();
    } catch(e){}
  }, (FADE + 0.4) * 1000);
}

// PERSISTANTS : 1re fois → construit ; ensuite → retune lisse (zéro clic, zéro GC).
function swapPingala(i) {
  if (!flowing || !masterGain) return;
  const { pingala } = PAIRS[i];
  if (nodes[pingala.id]) {
    tuneOsc(pingala.id, calcPFreq(i));
  } else {
    nodes[pingala.id] = buildOsc(pingala.id, calcPFreq(i), pingala.vol, -1);
  }
  setTimeout(() => { if (flowing && masterGain) swapIda(i); }, 40);
  _applyAntiCrack();           // (point 2) répartition de gain anti-saturation
  updatePairUI(i);
}
function swapIda(i) {
  if (!flowing || !masterGain) return;
  const { ida } = PAIRS[i];
  if (nodes[ida.id]) {
    tuneOsc(ida.id, calcIFreq(i));
  } else {
    nodes[ida.id] = buildOsc(ida.id, calcIFreq(i), ida.vol, 1);
  }
  _applyAntiCrack();
  updatePairUI(i);
}
function swapPDebounced(i) { clearTimeout(swapTimers['p'+i]); swapTimers['p'+i] = setTimeout(() => swapPingala(i), 380); }
function swapIDebounced(i) { clearTimeout(swapTimers['i'+i]); swapTimers['i'+i] = setTimeout(() => swapIda(i), 380); }

function safeRamp(gainParam, target, duration) {
  const now = aNow();
  gainParam.cancelScheduledValues(now);
  gainParam.setValueAtTime(gainParam.value, now);
  gainParam.setTargetAtTime(target, now, Math.max(0.01, duration / 5));
}

/* ---------- 2.2 · ANTI-CRACK (repris de Matrice14 : gain ∝ 1/√actifs) ---------- */
// Empêche la sommation de tous les oscillateurs de saturer l'entrée du limiteur.
// On ne touche PAS au vol individuel choisi par l'utilisateur : on applique un
// coefficient global doux sur masterGain selon le nombre de voix actives.
let _antiCrackTarget = 1;
function _applyAntiCrack() {
  if (!masterGain) return;
  const active = Object.keys(nodes).length || 1;
  // 1 voix → 1.0 ; 14 voix → ~0.27. Borne basse 0.25 pour rester audible.
  _antiCrackTarget = Math.max(0.25, 1 / Math.sqrt(active));
}

/* ---------- 2.3 · IR DE RÉVERBE GÉNÉRÉE PAR CODE (convolution, option A) ---------- */
// Bruit décroissant exponentiel stéréo → impulse response. Aucun fichier externe.
function _makeIR(decay, preDelay) {
  const c = audioCtx(), sr = c.sampleRate;
  const len = Math.max(1, Math.floor(sr * (preDelay + decay)));
  const pd  = Math.floor(sr * preDelay);
  const ir  = c.createBuffer(2, len, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      if (i < pd) { d[i] = 0; continue; }
      const t = (i - pd) / (sr * decay);          // 0→1 sur la durée
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.4);  // queue lisse
    }
  }
  return ir;
}

/* ---------- 2.4 · FX CHAIN NATIVE (créée une seule fois) ---------- */
// Chaîne : input → EQ(low→mid→high) → compressor → delay
//          → [reverb optionnelle] → pingpong → LIMITEUR → destination
function initFXChain() {
  if (eqLow) return;
  const c = audioCtx();

  eqLow  = c.createBiquadFilter(); eqLow.type='lowshelf';  eqLow.frequency.value=200;  eqLow.gain.value=0;
  eqMid  = c.createBiquadFilter(); eqMid.type='peaking';   eqMid.frequency.value=1000; eqMid.Q.value=1; eqMid.gain.value=0;
  eqHigh = c.createBiquadFilter(); eqHigh.type='highshelf';eqHigh.frequency.value=5000; eqHigh.gain.value=0;

  compressor = c.createDynamicsCompressor();
  compressor.threshold.value=-24; compressor.ratio.value=4; compressor.attack.value=0.02; compressor.release.value=0.25;

  // — Feedback delay natif —
  masterDelay   = c.createDelay(1.0); masterDelay.delayTime.value=0.3;
  masterDelayFb = c.createGain(); masterDelayFb.gain.value=0.3;
  masterDelay.connect(masterDelayFb); masterDelayFb.connect(masterDelay);
  const delayWet = c.createGain(); delayWet.gain.value=0; masterDelay.connect(delayWet);

  // — Reverb à convolution (branchée seulement si wet>0, anti-CPU BT) —
  masterReverb = c.createConvolver();
  masterReverb.buffer = _makeIR(1.5, 0.05);
  reverbWetGain = c.createGain(); reverbWetGain.gain.value=0;
  reverbDryGain = c.createGain(); reverbDryGain.gain.value=1;

  // — Ping-pong natif : deux delays croisés L/R —
  ppL = c.createDelay(1.0); ppL.delayTime.value=0.25;
  ppR = c.createDelay(1.0); ppR.delayTime.value=0.25;
  ppFb = c.createGain(); ppFb.gain.value=0.3;
  ppL.connect(ppR); ppR.connect(ppFb); ppFb.connect(ppL);
  const splitMerge = c.createChannelMerger(2);
  ppL.connect(splitMerge, 0, 0); ppR.connect(splitMerge, 0, 1);
  ppWet = c.createGain(); ppWet.gain.value=0; splitMerge.connect(ppWet);
  pingPongDelay = { delayTime: ppL.delayTime, _fb: ppFb, _wet: ppWet };

  // ═══ RACK MASTER (calqué Allen & Heath DB4) ═══════════════════
  // Tout converge ici : un seul bus de sortie, un seul limiteur protège tout.
  // Étages : TRIM bus → EQ master 3B (54/216/432) → GLUE → FADER → LIMITEUR
  // Borné à la bande réelle du système : 36–864 Hz. Rien au-dessus.

  // — TRIM d'entrée du bus (structure de gain propre, avant le master) —
  busTrim = c.createGain(); busTrim.gain.value = 1;

  // — EQ master 3 bandes, pivots gravés dans le système —
  mEqLow  = c.createBiquadFilter(); mEqLow.type='lowshelf';  mEqLow.frequency.value=54;   mEqLow.gain.value=0;
  mEqMid  = c.createBiquadFilter(); mEqMid.type='peaking';   mEqMid.frequency.value=216;  mEqMid.Q.value=0.9; mEqMid.gain.value=0;
  mEqHigh = c.createBiquadFilter(); mEqHigh.type='highshelf';mEqHigh.frequency.value=432;  mEqHigh.gain.value=0;

  // — GLUE : compresseur de bus doux (colle le mix, ~1-2 dB max) —
  masterGlue = c.createDynamicsCompressor();
  masterGlue.threshold.value=-18; masterGlue.knee.value=6; masterGlue.ratio.value=2;
  masterGlue.attack.value=0.03;   masterGlue.release.value=0.25;

  // — FADER master (le vrai volume de sortie, distinct des voies) —
  masterFader = c.createGain(); masterFader.gain.value = 1;

  // — LIMITEUR brickwall (sécurité auditive, intouchable) — plafond −3,6 dB —
  limiter = c.createDynamicsCompressor();
  limiter.threshold.value=-3.6; limiter.knee.value=0; limiter.ratio.value=20;
  limiter.attack.value=0.002; limiter.release.value=0.18;

  // — Chaînage du rack : busTrim → EQ → glue → fader → limiteur → sortie —
  busTrim.connect(mEqLow); mEqLow.connect(mEqMid); mEqMid.connect(mEqHigh);
  mEqHigh.connect(masterGlue); masterGlue.connect(masterFader);
  masterFader.connect(limiter); limiter.connect(c.destination);

  // — Câblage chaîne FX → entrée du bus master (busTrim) —
  eqLow.connect(eqMid); eqMid.connect(eqHigh);
  eqHigh.connect(compressor);
  // compressor → (delays en parallèle wet) + (dry direct) → BUS MASTER
  compressor.connect(busTrim);                  // dry direct
  compressor.connect(masterDelay);  delayWet.connect(busTrim);
  compressor.connect(reverbDryGain); reverbDryGain.connect(busTrim);
  compressor.connect(ppL);          ppWet.connect(busTrim);
  // reverb wet (parallèle, alimentée seulement quand active)
  reverbWetGain.connect(masterReverb); masterReverb.connect(busTrim);

  _fxInput = eqLow;
  _fxRefs = { delayWet }; // gardé pour réglages wet
}
let _fxRefs = {};

/* ---------- 2.5 · REVERB ON/OFF (alimente la branche convolution) ---------- */
let _reverbActive = false;
function _setReverbActive(on) {
  if (!compressor || !reverbWetGain || on === _reverbActive) return;
  try {
    if (on) compressor.connect(reverbWetGain);
    else    compressor.disconnect(reverbWetGain);
    _reverbActive = on;
  } catch(e) {}
}

const REVERB_SPACES = {
  sec:        { decay: 0.4,  preDelay: 0.01 },
  grotte:     { decay: 2.8,  preDelay: 0.08 },
  cathedrale: { decay: 5.5,  preDelay: 0.15 },
  cosmos:     { decay: 14.0, preDelay: 0.40 }
};
async function setReverbSpace(name) {
  const s = REVERB_SPACES[name]; if (!s || !masterReverb) return;
  masterReverb.buffer = _makeIR(s.decay, s.preDelay);   // régénère l'IR
  const sl = document.getElementById('reverbWet');
  if (sl && parseFloat(sl.value) < 0.05) { sl.value = 0.32; updateFX('reverbWet', 0.32); }
}

function setFadeDur(v) {
  _fadeDur = Math.max(0.5, Math.min(15, parseFloat(v)));
  const el = document.getElementById('sv-fade'); if (el) el.textContent = _fadeDur.toFixed(1) + 's';
}

/* ---------- 2.6 · LFO & BREATH (modulation dans l'audio thread) ---------- */
// OscillatorNode basse fréquence → gain de profondeur → AudioParam cible.
// Le signal LFO module masterGain.gain autour de 1 (offset porté par le gain).
function lfoToggle(on) {
  LFO_STATE.on = on;
  if (!_lfoNode || !_lfoDepthGain || !_lfoGain) return;
  if (on) {
    _lfoDepthGain.gain.value = LFO_STATE.depth;
  } else {
    _lfoDepthGain.gain.setTargetAtTime(0, aNow(), 0.1);
  }
}
function lfoSet(param, v) {
  LFO_STATE[param] = parseFloat(v);
  if (_lfoNode) {
    if (param === 'rate')  _lfoNode.frequency.setTargetAtTime(LFO_STATE.rate, aNow(), 0.05);
    if (param === 'depth' && LFO_STATE.on) _lfoDepthGain.gain.setTargetAtTime(LFO_STATE.depth, aNow(), 0.05);
  }
  const el = document.getElementById('sv-lfo-' + param); if (el) el.textContent = parseFloat(v).toFixed(2);
}

function breathToggle(on) {
  BREATH_STATE.on = on;
  if (!_breathLFO || !_breathDepthGain || !_breathGain) return;
  if (on) {
    _breathDepthGain.gain.value = BREATH_STATE.depth;
  } else {
    _breathDepthGain.gain.setTargetAtTime(0, aNow(), 0.5);
  }
}
function breathSet(param, v) {
  BREATH_STATE[param] = parseFloat(v);
  if (_breathLFO) {
    if (param === 'rate')  _breathLFO.frequency.setTargetAtTime(BREATH_STATE.rate, aNow(), 0.05);
    if (param === 'depth' && BREATH_STATE.on) _breathDepthGain.gain.setTargetAtTime(BREATH_STATE.depth, aNow(), 0.05);

  if (el) el.textContent = param === 'rate'
    ? (BREATH_STATE.rate * 60).toFixed(1) + ' /min'
    : parseFloat(v).toFixed(2);
