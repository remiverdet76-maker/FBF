name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install Capacitor dependencies
        working-directory: apk
        run: npm install

      - name: Prepare web assets — FBF 432 seul
        working-directory: apk
        run: |
          mkdir -p www
          # FBF 432 est la seule page de l'APK
          cp -r ../fbf432/. www/
          # Samples (Voix/Instruments/Drone/Ambiance/Chakra)
          mkdir -p www/samples
          for d in voix instruments drone ambiance chakra; do
            mkdir -p www/samples/$d
            if [ -d "../samples/$d" ]; then
              find "../samples/$d" \( -name "*.ogg" -o -name "*.mp3" -o -name "*.wav" \) \
                -exec cp {} "www/samples/$d/" \; 2>/dev/null || true
            fi
          done
          echo "www/ contents:"; ls -lh www/

      - name: Remove Google Fonts (offline fallback)
        working-directory: apk/www
        run: |
          sed -i '/<link rel="preconnect" href="https:\/\/fonts\.googleapis\.com">/d' index.html
          sed -i '/<link rel="preconnect" href="https:\/\/fonts\.gstatic\.com"/d' index.html
          sed -i 's|<link href="https://fonts\.googleapis\.com[^"]*" rel="stylesheet">||g' index.html

      - name: Add Android platform
        working-directory: apk
        run: npx cap add android

      - name: App icon — Mandala solaire 36 Rayons
        working-directory: apk
        continue-on-error: true
        run: |
          SRC=../fbf432/assets/logo-36rayons.png
          RES=android/app/src/main/res
          if [ -f "$SRC" ]; then
            # Carré centré (retire le texte bas de la mandala)
            convert "$SRC" -gravity center -crop 1024x1024+0+0 +repage /tmp/icon_sq.png
            for pair in "mdpi 48" "hdpi 72" "xhdpi 96" "xxhdpi 144" "xxxhdpi 192"; do
              d=$(echo $pair | cut -d' ' -f1); px=$(echo $pair | cut -d' ' -f2)
              mkdir -p "$RES/mipmap-$d"
              convert /tmp/icon_sq.png -resize ${px}x${px} "$RES/mipmap-$d/ic_launcher.png"
              convert /tmp/icon_sq.png -resize ${px}x${px} "$RES/mipmap-$d/ic_launcher_round.png"
              # Foreground adaptatif : mandala plein cadre (fond masqué)
              convert /tmp/icon_sq.png -resize ${px}x${px} "$RES/mipmap-$d/ic_launcher_foreground.png"
            done
            echo "Icône mandala appliquée."
          else
            echo "Logo introuvable, icône par défaut conservée."
          fi

      - name: Sync web assets to Android
        working-directory: apk
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FBF432-debug
          path: apk/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          APK=apk/android/app/build/outputs/apk/debug/app-debug.apk
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**App:** FBF 432 | **Package:** com.fbf.omcha432" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -sh $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "Télécharger dans l'onglet **Artifacts** ci-dessus." >> $GITHUB_STEP_SUMMARY
