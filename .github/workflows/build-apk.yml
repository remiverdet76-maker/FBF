name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Install Capacitor dependencies
        working-directory: apk
        run: npm install

      - name: Prepare web assets
        working-directory: apk
        run: |
          mkdir -p www
          # Tous les HTML de la racine sont embarqués (modules auto-détectés).
          for f in ../*.html; do [ -f "$f" ] && cp "$f" www/; done
          # Page d'accueil = Omcha396
          cp ../0mcha396_v2.html www/index.html
          rm -f www/0mcha396_v2.html
          # Fond cosmique rotatif + bus audio + 9:16 images
          cp ../bg-rotator.css ../bg-rotator.js ../audio-bus.js www/
          mkdir -p www/img
          cp ../img/*.jpg www/img/
          # Module multi-fichiers FBF 432 (1ʳᵉ version) : dossier complet
          [ -d ../fbf432 ] && cp -r ../fbf432 www/fbf432
          echo "www/ contents:"; ls -lh www/; echo "www/img:"; ls -lh www/img/

      - name: Remove Google Fonts (offline fallback)
        working-directory: apk/www
        run: |
          # Sur tous les HTML : retire preconnect + feuilles de style Google Fonts
          for f in *.html; do
            sed -i '/<link rel="preconnect" href="https:\/\/fonts\.googleapis\.com">/d' "$f"
            sed -i '/<link rel="preconnect" href="https:\/\/fonts\.gstatic\.com"/d' "$f"
            sed -i 's|<link href="https://fonts\.googleapis\.com[^"]*" rel="stylesheet">||g' "$f"
            sed -i "s|@import url('https://fonts\.googleapis\.com[^']*');||g" "$f"
          done

      - name: Audio-bus + manifeste des modules
        working-directory: apk/www
        run: |
          # 1) Injecte le bus d'exclusivité audio dans chaque MODULE (pas l'accueil)
          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            grep -q 'audio-bus.js' "$f" || \
              sed -i 's#</body>#<script src="audio-bus.js"></script>\n</body>#I' "$f"
          done
          # Module multi-fichiers fbf432 (sous-dossier) : audio-bus en chemin relatif
          if [ -f fbf432/index.html ]; then
            grep -q 'audio-bus.js' fbf432/index.html || \
              sed -i 's#</body>#<script src="../audio-bus.js"></script>\n</body>#I' fbf432/index.html
          fi
          # 2) Génère modules.js : liste {file,title} de tous les modules (hors accueil)
          {
            echo "window.FBF_MODULES = ["
            first=1
            for f in *.html; do
              [ "$f" = "index.html" ] && continue
              t=$(grep -o '<title>[^<]*</title>' "$f" | head -1 | sed 's/<[^>]*>//g')
              [ -z "$t" ] && t="$f"
              t=$(printf '%s' "$t" | sed "s/'/\\\\'/g")
              [ $first -eq 0 ] && echo ","
              printf "  {file:'%s', title:'%s', ico:'\\u25c9'}" "$f" "$t"
              first=0
            done
            # Module dossier fbf432 (1ʳᵉ version FBF)
            if [ -f fbf432/index.html ]; then
              [ $first -eq 0 ] && echo ","
              printf "  {file:'fbf432/index.html', title:'FBF 432 — 1re version', ico:'\\u25c8'}"
              first=0
            fi
            echo ""
            echo "];"
          } > modules.js
          echo "=== modules.js ==="; cat modules.js

      - name: Add Android platform
        working-directory: apk
        run: npx cap add android

      - name: Sync web assets to Android
        working-directory: apk
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apk/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OmCha432-debug
          path: apk/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Summary
        run: |
          APK=apk/android/app/build/outputs/apk/debug/app-debug.apk
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**App:** OmCha 432 | **Package:** com.fbf.omcha432" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -sh $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "Télécharger dans l'onglet **Artifacts** ci-dessus." >> $GITHUB_STEP_SUMMARY
